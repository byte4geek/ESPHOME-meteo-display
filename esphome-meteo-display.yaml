esphome:
  name: meteo-display
  friendly_name: Meteo Display
  on_boot:
    - priority: 600.0
      then:
        - output.set_level:
            id: lcd_backlight
            level: 1.0
    - priority: -100.0
      then:
        - output.set_level:
            id: lcd_backlight
            level: !lambda |-
              float val = id(screen_brightness).state;
              if (std::isnan(val) || val < 0.0f || val > 100.0f) {
                return 1.0f;
              }
              return val / 100.0f;
        - wait_until:
            api.connected:
        - delay: 2s
        - lambda: |-
            if (!id(history_initialized)) {
              for (int i = 0; i < 48; i++) {
                id(temp_history)[i] = NAN;
                id(hum_history)[i] = NAN;
                id(press_history)[i] = NAN;
              }
              id(temp_history)[47] = id(backyard_temperature).state;
              id(hum_history)[47] = id(backyard_humidity).state;
              id(press_history)[47] = id(outdoor_pressure).state;
              id(history_initialized) = true;
            }
        - component.update: lcd
        - script.execute: page_cycling  # ✅ Avviamento iniziale UNICO

globals:
  - id: temp_history
    type: float[48]
    restore_value: yes
  - id: hum_history
    type: float[48]
    restore_value: yes
  - id: press_history
    type: float[48]
    restore_value: yes
  - id: history_initialized
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: active_page
    type: int
    initial_value: '0'
  - id: cycle_paused
    type: bool
    initial_value: 'false'
  - id: click_pending
    type: bool
    initial_value: 'false'

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:

api:
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

web_server:
  port: 80

http_request:
  useragent: esphome/device
  timeout: 10s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Meteo-Display-AP"
    password: !secret ap_password

captive_portal:

i2c:
  sda: GPIO27
  scl: GPIO18
  frequency: 100kHz

spi:
  - id: hspi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

touchscreen:
  - platform: xpt2046
    id: my_touchscreen
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    calibration:
      x_min: 222
      x_max: 3367
      y_min: 192
      y_max: 3732
    transform:
      swap_xy: true

output:
  - platform: ledc
    pin: GPIO21
    id: lcd_backlight
    frequency: 1000Hz

number:
  - platform: template
    name: "Screen Brightness"
    id: screen_brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    set_action:
      - output.set_level:
          id: lcd_backlight
          level: !lambda 'return x / 100.0;'

display:
  - platform: mipi_spi
    id: lcd
    spi_id: hspi
    model: ST7789V
    dimensions:
      width: 240
      height: 320
    cs_pin: GPIO15
    dc_pin: GPIO2
    color_order: BGR
    invert_colors: false
    data_rate: 8MHz
    auto_clear_enabled: false

