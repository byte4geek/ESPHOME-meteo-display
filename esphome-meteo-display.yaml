      - lambda: |-
          auto draw_chart = [](lv_obj_t* canvas, float* history, lv_color_t color, lv_obj_t* min_lbl, lv_obj_t* max_lbl, const char* unit) {
            lv_canvas_fill_bg(canvas, lv_color_hex(0x121212), LV_OPA_COVER);
            
            lv_layer_t layer;
            lv_canvas_init_layer(canvas, &layer);

            lv_draw_line_dsc_t grid_dsc;
            lv_draw_line_dsc_init(&grid_dsc);
            grid_dsc.width = 1;
            grid_dsc.color = lv_color_hex(0x222222);
            for (int y_grid = 11; y_grid < 55; y_grid += 11) {
              grid_dsc.p1.x = 0;
              grid_dsc.p1.y = y_grid;
              grid_dsc.p2.x = 220;
              grid_dsc.p2.y = y_grid;
              lv_draw_line(&layer, &grid_dsc);
            }

            float min_val = 9999.0f;
            float max_val = -9999.0f;
            bool has_data = false;
            for (int i = 0; i < 48; i++) {
              float val = history[i];
              if (!std::isnan(val)) {
                if (val < min_val) min_val = val;
                if (val > max_val) max_val = val;
                has_data = true;
              }
            }

            if (has_data) {
              char min_str[32];
              char max_str[32];
              if (strcmp(unit, "%") == 0 || strcmp(unit, " hPa") == 0) {
                sprintf(min_str, "%.0f%s", min_val, unit);
                sprintf(max_str, "%.0f%s", max_val, unit);
              } else {
                sprintf(min_str, "%.1f%s", min_val, unit);
                sprintf(max_str, "%.1f%s", max_val, unit);
              }
              lv_label_set_text(min_lbl, min_str);
              lv_label_set_text(max_lbl, max_str);

              lv_draw_line_dsc_t line_dsc;
              lv_draw_line_dsc_init(&line_dsc);
              line_dsc.width = 2;
              line_dsc.color = color;

              float range = max_val - min_val;
              float last_x = -1.0f;
              float last_y = -1.0f;

              for (int i = 0; i < 48; i++) {
                float val = history[i];
                if (!std::isnan(val)) {
                  float x = i * (220.0f / 47.0f);
                  float y;
                  if (range < 0.01f) {
                    y = 55.0f / 2.0f;
                  } else {
                    y = 50.0f - (val - min_val) * 45.0f / range;
                  }

                  if (last_x >= 0.0f) {
                    line_dsc.p1.x = (int32_t)last_x;
                    line_dsc.p1.y = (int32_t)last_y;
                    line_dsc.p2.x = (int32_t)x;
                    line_dsc.p2.y = (int32_t)y;
                    lv_draw_line(&layer, &line_dsc);
                  }
                  last_x = x;
                  last_y = y;
                }
              }
            } else {
              lv_label_set_text(min_lbl, "--");
              lv_label_set_text(max_lbl, "--");
            }

            lv_canvas_finish_layer(canvas, &layer);
            lv_obj_invalidate(canvas);
          };

          if (id(active_page) == 2) {
            draw_chart(id(temp_chart), id(temp_history), lv_color_hex(0xFF5555), id(temp_min_label), id(temp_max_label), "°");
            draw_chart(id(hum_chart), id(hum_history), lv_color_hex(0x5555FF), id(hum_min_label), id(hum_max_label), "%");
            draw_chart(id(press_chart), id(press_history), lv_color_hex(0x55FF55), id(press_min_label), id(press_max_label), " hPa");
          }

