# ✅ SCRIPT CORRETTO - SENZA LOOP INFINITO
script:
  # Script principale di cycling pagine - NON RICORSIVO
  - id: page_cycling
    mode: single  # ✅ CAMBIAMENTO: single invece di restart
    then:
      - while:
          condition:
            lambda: 'return !id(cycle_paused);'  # ✅ Loop controllato da while
          then:
            - delay: 10s  # Attesa tra pagine
            - if:
                condition:
                  lambda: 'return id(active_page) == 0;'
                then:
                  - globals.set:
                      id: active_page
                      value: '1'
                  - lvgl.page.show: solar_page
                else:
                  - if:
                      condition:
                        lambda: 'return id(active_page) == 1;'
                      then:
                        - globals.set:
                            id: active_page
                            value: '0'
                        - lvgl.page.show: main_page

  # Script per gestire i click con doppio tap
  - id: handle_page_click
    mode: single  # ✅ CAMBIAMENTO: single per evitare sovrapposizioni
    then:
      - if:
          condition:
            lambda: 'return id(click_pending);'
          then:
            # ✅ DOPPIO TAP RILEVATO: Pausa/Riprendi cycling
            - globals.set:
                id: click_pending
                value: 'false'
            - lambda: |-
                id(cycle_paused) = !id(cycle_paused);
                if (id(cycle_paused)) {
                  ESP_LOGI("click", "Page cycling PAUSED");
                } else {
                  ESP_LOGI("click", "Page cycling RESUMED");
                  id(page_cycling).execute();
                }
          else:
            # ✅ PRIMO TAP: Imposta flag e attendi 350ms per doppio tap
            - globals.set:
                id: click_pending
                value: 'true'
            - delay: 350ms
            - if:
                condition:
                  lambda: 'return id(click_pending);'
                then:
                  # ✅ SINGOLO TAP: Cambia pagina
                  - globals.set:
                      id: click_pending
                      value: 'false'
                  - if:
                      condition:
                        lambda: 'return id(active_page) == 0;'
                      then:
                        - globals.set:
                            id: active_page
                            value: '1'
                        - lvgl.page.show: solar_page
                      else:
                        - if:
                            condition:
                              lambda: 'return id(active_page) == 1;'
                            then:
                              - globals.set:
                                  id: active_page
                                  value: '2'
                              - lvgl.page.show: charts_page
                              - lambda: 'id(cycle_paused) = true;'  # Pausa cycling in charts


interval:
  - interval: 5s
    then:
      - lvgl.label.update:
          id: time_display
          text: !lambda |-
            return id(homeassistant_time).now().strftime("%H:%M").c_str();
      - lvgl.label.update:
          id: date_display
          text: !lambda |-
            auto time = id(homeassistant_time).now();
            std::string day;
            switch (time.day_of_week) {
              case 1: day = "Dom"; break;
              case 2: day = "Lun"; break;
              case 3: day = "Mar"; break;
              case 4: day = "Mer"; break;
              case 5: day = "Gio"; break;
              case 6: day = "Ven"; break;
              case 7: day = "Sab"; break;
              default: day = "---"; break;
            }
            std::string month;
            switch (time.month) {
              case 1: month = "Gen"; break;
              case 2: month = "Feb"; break;
              case 3: month = "Mar"; break;
              case 4: month = "Apr"; break;
              case 5: month = "Mag"; break;
              case 6: month = "Giu"; break;
              case 7: month = "Lug"; break;
              case 8: month = "Ago"; break;
              case 9: month = "Set"; break;
              case 10: month = "Ott"; break;
              case 11: month = "Nov"; break;
              case 12: month = "Dic"; break;
              default: month = "---"; break;
            }
            return str_sprintf("%s, %02d %s", day.c_str(), time.day_of_month, month.c_str());
      - lvgl.label.update:
          id: backyard_temperature_label
          text: !lambda |-
            return str_sprintf("%.0f°", id(backyard_temperature).state);
      - lvgl.label.update:
          id: backyard_humidity_label
          text: !lambda |-
            return str_sprintf("%.0f%%", id(backyard_humidity).state);
          text_color: !lambda |-
            float hum = id(backyard_humidity).state;
            if (hum < 30) return lv_color_hex(0xD2691E);
            if (hum < 45) return lv_color_hex(0xDEB887);
            if (hum < 60) return lv_color_hex(0x87CEEB);
            if (hum < 75) return lv_color_hex(0x4682B4);
            return lv_color_hex(0x1E90FF);

      - lvgl.label.update:
          id: wind_label
          text: !lambda |-
            float speed = id(wind_speed).state;
            float bearing = id(wind_bearing).state;
            std::string dir = "N";
            if (bearing >= 337.5 || bearing < 22.5) dir = "N";
            else if (bearing >= 22.5 && bearing < 67.5) dir = "NE";
            else if (bearing >= 67.5 && bearing < 112.5) dir = "E";
            else if (bearing >= 112.5 && bearing < 157.5) dir = "SE";
            else if (bearing >= 157.5 && bearing < 202.5) dir = "S";
            else if (bearing >= 202.5 && bearing < 247.5) dir = "SO";
            else if (bearing >= 247.5 && bearing < 292.5) dir = "O";
            else if (bearing >= 292.5 && bearing < 337.5) dir = "NO";
            return str_sprintf("%.1f km/h %s", speed, dir.c_str());
      
      # ✅ FRECCIA VENTO - Glifi corretti da Material Design Icons
      - lvgl.label.update:
          id: wind_arrow
          text: !lambda |-
            float bearing = id(wind_bearing).state;
            if (bearing >= 337.5 || bearing < 22.5) return "\U000F005D";     // mdi-arrow-up (N)
            if (bearing >= 22.5 && bearing < 67.5) return "\U000F005C";      // mdi-arrow-top-right (NE)
            if (bearing >= 67.5 && bearing < 112.5) return "\U000F0054";     // mdi-arrow-right (E)
            if (bearing >= 112.5 && bearing < 157.5) return "\U000F0043";    // mdi-arrow-bottom-right (SE)
